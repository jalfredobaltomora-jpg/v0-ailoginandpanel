      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,260)">
